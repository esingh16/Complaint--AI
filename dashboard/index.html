<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinCompliance AI — Complaint Intelligence Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap');

  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --surface2: #1a2236;
    --border: #1e2d45;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --success: #00e676;
    --warning: #ffd600;
    --danger: #ff1744;
    --text: #e2e8f0;
    --muted: #64748b;
    --font: 'IBM Plex Sans', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 1400px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

  /* Header */
  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 0;
    background: rgba(10,14,23,0.9);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), #0066cc);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .logo-text span { color: var(--accent); }

  .header-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--success);
  }

  .status-dot {
    width: 8px; height: 8px;
    background: var(--success);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Main layout */
  main { padding: 32px 0; }

  /* Input section */
  .input-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 28px;
  }

  .section-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .input-grid {
    display: grid;
    grid-template-columns: 1fr 200px;
    gap: 16px;
    align-items: start;
  }

  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    padding: 16px;
    resize: vertical;
    min-height: 120px;
    transition: border-color 0.2s;
    outline: none;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  .action-col { display: flex; flex-direction: column; gap: 10px; }

  button {
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-family: var(--font);
    font-weight: 600;
    font-size: 14px;
    padding: 14px 20px;
    transition: all 0.2s;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #0088cc);
    color: #000;
    letter-spacing: 0.3px;
  }

  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    font-size: 13px;
    padding: 10px 14px;
  }

  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  /* Loading */
  .loading-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 16px;
    display: none;
  }

  .loading-bar.active { display: block; }

  .loading-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    animation: loading 1.5s ease-in-out infinite;
  }

  @keyframes loading {
    0% { width: 0%; margin-left: 0; }
    50% { width: 70%; margin-left: 15%; }
    100% { width: 0%; margin-left: 100%; }
  }

  /* Agent progress */
  .agent-steps {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 28px;
    display: none;
  }

  .agent-steps.visible { display: grid; }

  .agent-step {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    transition: all 0.3s;
  }

  .agent-step.active {
    border-color: var(--accent);
    background: rgba(0,212,255,0.05);
  }

  .agent-step.done {
    border-color: var(--success);
    background: rgba(0,230,118,0.05);
  }

  .step-icon { font-size: 24px; margin-bottom: 8px; }
  .step-name { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
  .step-status { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .agent-step.active .step-status { color: var(--accent); }
  .agent-step.done .step-status { color: var(--success); }

  /* Results grid */
  .results-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-bottom: 28px;
  }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  .result-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }

  .result-card.classification::before { background: linear-gradient(90deg, var(--accent), #0066cc); }
  .result-card.rootcause::before { background: linear-gradient(90deg, var(--accent2), #cc4400); }
  .result-card.assignment::before { background: linear-gradient(90deg, var(--warning), #cc9900); }

  .card-title {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    font-family: var(--mono);
    margin: 3px 3px 3px 0;
  }

  .badge-critical { background: rgba(255,23,68,0.15); color: var(--danger); border: 1px solid rgba(255,23,68,0.3); }
  .badge-high { background: rgba(255,107,53,0.15); color: var(--accent2); border: 1px solid rgba(255,107,53,0.3); }
  .badge-medium { background: rgba(255,214,0,0.15); color: var(--warning); border: 1px solid rgba(255,214,0,0.3); }
  .badge-low { background: rgba(0,230,118,0.15); color: var(--success); border: 1px solid rgba(0,230,118,0.3); }
  .badge-info { background: rgba(0,212,255,0.15); color: var(--accent); border: 1px solid rgba(0,212,255,0.3); }

  .metric-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .metric-row:last-child { border-bottom: none; }
  .metric-label { color: var(--muted); }
  .metric-value { font-weight: 600; font-family: var(--mono); font-size: 12px; }

  /* Score bar */
  .score-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 4px;
  }

  .score-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.8s ease;
  }

  /* Full-width cards */
  .full-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 20px;
  }

  .resolution-steps {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 16px;
  }

  .step-item {
    display: grid;
    grid-template-columns: 40px 1fr 120px 100px;
    gap: 12px;
    align-items: center;
    background: var(--surface2);
    border-radius: 10px;
    padding: 14px 16px;
    border: 1px solid var(--border);
  }

  .step-num {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), #0066cc);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #000;
  }

  .step-action { font-size: 13px; }
  .step-owner { font-family: var(--mono); font-size: 11px; color: var(--accent); text-align: center; }
  .step-deadline { font-family: var(--mono); font-size: 11px; color: var(--muted); text-align: right; }

  /* Customer response */
  .response-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 10px;
    padding: 20px;
    font-size: 13px;
    line-height: 1.7;
    white-space: pre-wrap;
    margin-top: 16px;
    font-family: var(--font);
  }

  /* Compliance flags */
  .flags-section { margin-top: 12px; }

  /* Empty / error state */
  .empty-state {
    text-align: center;
    padding: 60px;
    color: var(--muted);
  }

  .empty-state .big-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
  .empty-state p { font-size: 14px; }

  /* Error */
  .error-card {
    background: rgba(255,23,68,0.08);
    border: 1px solid rgba(255,23,68,0.3);
    border-radius: 12px;
    padding: 20px;
    color: var(--danger);
    font-size: 14px;
  }

  /* Responsive */
  @media (max-width: 900px) {
    .results-grid { grid-template-columns: 1fr; }
    .agent-steps { grid-template-columns: repeat(2, 1fr); }
    .input-grid { grid-template-columns: 1fr; }
    .step-item { grid-template-columns: 40px 1fr; }
    .step-owner, .step-deadline { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="container">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">⚖️</div>
        <div class="logo-text">Fin<span>Compliance</span> AI</div>
      </div>
      <div class="header-status">
        <div class="status-dot"></div>
        AGENTIC PIPELINE READY
      </div>
    </div>
  </div>
</header>

<main>
<div class="container">

  <!-- Input -->
  <div class="input-section">
    <div class="section-label">// complaint intake</div>
    <div class="input-grid">
      <div>
        <textarea id="complaintInput" placeholder="Paste a customer complaint narrative here...&#10;&#10;Example: My credit card was closed without notice causing my credit score to drop 87 points. I was never late on a payment..." rows="5"></textarea>
        <div class="loading-bar" id="loadingBar">
          <div class="loading-fill"></div>
        </div>
      </div>
      <div class="action-col">
        <button class="btn-primary" id="processBtn" onclick="processComplaint()">
          ▶ Run Agents
        </button>
        <button class="btn-secondary" onclick="loadSample()">Load Sample</button>
        <button class="btn-secondary" onclick="clearAll()">Clear</button>
      </div>
    </div>
  </div>

  <!-- Agent Progress -->
  <div class="agent-steps" id="agentSteps">
    <div class="agent-step" id="step-classify">
      <div class="step-icon">📊</div>
      <div class="step-name">Classifier Agent</div>
      <div class="step-status">waiting...</div>
    </div>
    <div class="agent-step" id="step-rootcause">
      <div class="step-icon">🔍</div>
      <div class="step-name">Root Cause Agent</div>
      <div class="step-status">waiting...</div>
    </div>
    <div class="agent-step" id="step-assign">
      <div class="step-icon">🎯</div>
      <div class="step-name">Assignment Agent</div>
      <div class="step-status">waiting...</div>
    </div>
    <div class="agent-step" id="step-resolve">
      <div class="step-icon">📋</div>
      <div class="step-name">Resolution Agent</div>
      <div class="step-status">waiting...</div>
    </div>
  </div>

  <!-- Results -->
  <div id="resultsContainer">
    <div class="empty-state">
      <div class="big-icon">🤖</div>
      <h3>Agentic Pipeline Ready</h3>
      <p>Enter a complaint narrative and click "Run Agents" to process it through all 4 AI agents.</p>
    </div>
  </div>

</div>
</main>

<script>
const ANTHROPIC_API = "https://api.anthropic.com/v1/messages";
const MODEL = "claude-sonnet-4-20250514";

const SAMPLE_COMPLAINT = `I have been a customer for 3 years and my credit card was suddenly closed without any notice or warning. When I called customer service, I was told it was due to an 'account review' but no one could give me a specific reason. This has caused my credit score to drop by 87 points because my credit utilization ratio changed drastically. I had $15,000 in available credit and now I have nothing. I was never late on a payment and always paid more than the minimum. I believe this may be discriminatory because I recently disclosed a disability to the company. I need this account reinstated immediately and I demand that my credit score damage be addressed. I have been trying to reach a manager for 3 weeks with no response.`;

function loadSample() {
  document.getElementById('complaintInput').value = SAMPLE_COMPLAINT;
}

function clearAll() {
  document.getElementById('complaintInput').value = '';
  document.getElementById('resultsContainer').innerHTML = `
    <div class="empty-state">
      <div class="big-icon">🤖</div>
      <h3>Agentic Pipeline Ready</h3>
      <p>Enter a complaint narrative and click "Run Agents" to process it through all 4 AI agents.</p>
    </div>`;
  document.getElementById('agentSteps').classList.remove('visible');
}

function setStepStatus(stepId, status) {
  const el = document.getElementById(stepId);
  el.className = 'agent-step ' + status;
  el.querySelector('.step-status').textContent =
    status === 'active' ? 'processing...' :
    status === 'done' ? '✓ complete' : 'waiting...';
}

async function callClaude(systemPrompt, userPrompt) {
  const response = await fetch(ANTHROPIC_API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: MODEL,
      max_tokens: 1000,
      system: systemPrompt,
      messages: [{ role: 'user', content: userPrompt }]
    })
  });
  const data = await response.json();
  if (data.error) throw new Error(data.error.message);
  return JSON.parse(data.content[0].text.trim());
}

async function processComplaint() {
  const narrative = document.getElementById('complaintInput').value.trim();
  if (!narrative) { alert('Please enter a complaint narrative.'); return; }

  const btn = document.getElementById('processBtn');
  const loadingBar = document.getElementById('loadingBar');
  btn.disabled = true;
  btn.textContent = '⏳ Processing...';
  loadingBar.classList.add('active');

  document.getElementById('agentSteps').classList.add('visible');
  ['step-classify','step-rootcause','step-assign','step-resolve'].forEach(s => setStepStatus(s, ''));
  document.getElementById('resultsContainer').innerHTML = '';

  try {
    // Agent 1: Classify
    setStepStatus('step-classify', 'active');
    const classification = await callClaude(
      'You are a financial complaint classifier. Always respond with valid JSON only, no markdown.',
      `Classify this complaint: "${narrative}"
Return JSON with: product_category, issue_type, severity (low/medium/high/critical), compliance_risk (none/low/medium/high), compliance_flags (array), sentiment_score (-1 to 1), urgency_score (0 to 1), reasoning`
    );
    setStepStatus('step-classify', 'done');

    // Agent 2: Root Cause
    setStepStatus('step-rootcause', 'active');
    const rootCause = await callClaude(
      'You are a root cause analysis expert for financial services. Always respond with valid JSON only.',
      `Analyze root cause of this complaint: "${narrative}"
Classification: ${JSON.stringify(classification)}
Return JSON with: primary_root_cause, root_cause_category (People/Process/Technology/Policy/External), contributing_factors (array), systemic_issue (bool), customer_impact, recurrence_risk (low/medium/high)`
    );
    setStepStatus('step-rootcause', 'done');

    // Agent 3: Assign
    setStepStatus('step-assign', 'active');
    const assignment = await callClaude(
      'You are a complaint routing system for a fintech company. Always respond with valid JSON only.',
      `Route this complaint based on: Classification: ${JSON.stringify(classification)}, Root Cause: ${JSON.stringify(rootCause)}
Return JSON with: primary_team (team name), priority (P1/P2/P3/P4), sla_hours (number), escalate_immediately (bool), escalation_reason, routing_rationale, required_actions (array)`
    );
    setStepStatus('step-assign', 'done');

    // Agent 4: Resolution
    setStepStatus('step-resolve', 'active');
    const resolution = await callClaude(
      'You are a senior complaints resolution specialist. Always respond with valid JSON only.',
      `Generate resolution plan for: "${narrative}"
Classification: ${JSON.stringify(classification)}, Assignment: ${JSON.stringify(assignment)}
Return JSON with: resolution_summary, remediation_steps (array of {step,action,owner,deadline_hours}), customer_response_draft (full letter), preventive_recommendations (array of {recommendation,effort}), compensation_recommended (bool), estimated_resolution_hours`
    );
    setStepStatus('step-resolve', 'done');

    renderResults(narrative, classification, rootCause, assignment, resolution);

  } catch (err) {
    document.getElementById('resultsContainer').innerHTML = `
      <div class="error-card">
        <strong>⚠️ Pipeline Error:</strong> ${err.message}<br><br>
        Make sure your Anthropic API key is configured correctly.
      </div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '▶ Run Agents';
    loadingBar.classList.remove('active');
  }
}

function severityBadge(s) {
  const map = { critical: 'badge-critical', high: 'badge-high', medium: 'badge-medium', low: 'badge-low' };
  return `<span class="badge ${map[s] || 'badge-info'}">${(s||'').toUpperCase()}</span>`;
}

function renderResults(narrative, cls, rc, asgn, res) {
  const urgencyPct = Math.round((cls.urgency_score || 0) * 100);
  const sentimentPct = Math.round(((cls.sentiment_score || 0) + 1) / 2 * 100);

  const flags = (cls.compliance_flags || []).map(f =>
    `<span class="badge badge-critical">${f}</span>`).join('') || '<span class="badge badge-low">None</span>';

  const steps = (res.remediation_steps || []).map(s => `
    <div class="step-item">
      <div class="step-num">${s.step || '?'}</div>
      <div class="step-action">${s.action || ''}</div>
      <div class="step-owner">${s.owner || ''}</div>
      <div class="step-deadline">${s.deadline_hours || '?'}h deadline</div>
    </div>`).join('');

  const preventive = (res.preventive_recommendations || []).map(p =>
    `<div class="metric-row"><span class="metric-label">→ ${p.recommendation}</span><span class="badge badge-info">${p.effort || ''}</span></div>`
  ).join('');

  document.getElementById('resultsContainer').innerHTML = `
    <!-- Top 3 cards -->
    <div class="results-grid">
      <!-- Classification -->
      <div class="result-card classification">
        <div class="card-title">// classifier agent</div>
        <div style="margin-bottom:12px">${severityBadge(cls.severity)} <span class="badge badge-info">${cls.product_category || ''}</span></div>
        <div class="metric-row"><span class="metric-label">Issue Type</span><span class="metric-value">${cls.issue_type || ''}</span></div>
        <div class="metric-row"><span class="metric-label">Compliance Risk</span><span class="metric-value" style="color:var(--${cls.compliance_risk === 'high' ? 'danger' : cls.compliance_risk === 'medium' ? 'warning' : 'success'})">${(cls.compliance_risk||'').toUpperCase()}</span></div>
        <div class="metric-row" style="flex-direction:column;align-items:start">
          <span class="metric-label" style="margin-bottom:6px">Urgency: ${urgencyPct}%</span>
          <div class="score-bar" style="width:100%"><div class="score-fill" style="width:${urgencyPct}%"></div></div>
        </div>
        <div class="metric-row" style="flex-direction:column;align-items:start">
          <span class="metric-label" style="margin-bottom:6px">Sentiment: ${sentimentPct}%</span>
          <div class="score-bar" style="width:100%"><div class="score-fill" style="width:${sentimentPct}%;background:linear-gradient(90deg,var(--danger),var(--success))"></div></div>
        </div>
        <div class="flags-section"><div class="metric-label" style="font-size:11px;margin-bottom:8px">COMPLIANCE FLAGS</div>${flags}</div>
      </div>

      <!-- Root Cause -->
      <div class="result-card rootcause">
        <div class="card-title">// root cause agent</div>
        <div class="metric-row"><span class="metric-label">Primary Cause</span></div>
        <p style="font-size:13px;padding:8px 0;line-height:1.5">${rc.primary_root_cause || ''}</p>
        <div class="metric-row"><span class="metric-label">Category</span><span class="badge badge-high">${rc.root_cause_category || ''}</span></div>
        <div class="metric-row"><span class="metric-label">Systemic Issue</span><span class="metric-value" style="color:var(--${rc.systemic_issue ? 'danger' : 'success'})">${rc.systemic_issue ? '⚠ YES' : '✓ NO'}</span></div>
        <div class="metric-row"><span class="metric-label">Recurrence Risk</span>${severityBadge(rc.recurrence_risk)}</div>
        <div style="margin-top:12px;font-size:12px;color:var(--muted);line-height:1.6">${rc.customer_impact || ''}</div>
      </div>

      <!-- Assignment -->
      <div class="result-card assignment">
        <div class="card-title">// assignment agent</div>
        <div class="metric-row"><span class="metric-label">Primary Team</span><span class="metric-value" style="color:var(--warning)">${asgn.primary_team || ''}</span></div>
        <div class="metric-row"><span class="metric-label">Priority</span><span class="badge ${asgn.priority === 'P1' ? 'badge-critical' : asgn.priority === 'P2' ? 'badge-high' : 'badge-medium'}">${asgn.priority || ''}</span></div>
        <div class="metric-row"><span class="metric-label">SLA</span><span class="metric-value">${asgn.sla_hours || '?'} hours</span></div>
        <div class="metric-row"><span class="metric-label">Escalate Now</span><span class="metric-value" style="color:var(--${asgn.escalate_immediately ? 'danger' : 'success'})">${asgn.escalate_immediately ? '🔴 YES' : '🟢 NO'}</span></div>
        ${asgn.escalation_reason ? `<div style="margin-top:10px;font-size:12px;color:var(--accent2);background:rgba(255,107,53,0.08);padding:10px;border-radius:8px">${asgn.escalation_reason}</div>` : ''}
        <div style="margin-top:12px">
          ${(asgn.required_actions||[]).map(a => `<div style="font-size:12px;color:var(--muted);padding:4px 0;border-bottom:1px solid var(--border)">→ ${a}</div>`).join('')}
        </div>
      </div>
    </div>

    <!-- Remediation Steps -->
    <div class="full-card">
      <div class="section-label">// resolution agent — remediation steps</div>
      <p style="font-size:14px;color:var(--muted);margin-bottom:16px">${res.resolution_summary || ''}</p>
      <div class="resolution-steps">${steps}</div>
      ${res.compensation_recommended ? `<div style="margin-top:16px;background:rgba(0,212,255,0.06);border:1px solid rgba(0,212,255,0.2);border-radius:10px;padding:14px;font-size:13px"><strong style="color:var(--accent)">💰 Compensation Recommended:</strong> ${res.compensation_details || ''}</div>` : ''}
    </div>

    <!-- Customer Response -->
    <div class="full-card">
      <div class="section-label">// resolution agent — regulatory-compliant customer response</div>
      <div class="response-box">${res.customer_response_draft || 'No response generated.'}</div>
    </div>

    <!-- Preventive Recommendations -->
    <div class="full-card">
      <div class="section-label">// resolution agent — preventive recommendations</div>
      <div style="margin-top:16px">${preventive}</div>
    </div>
  `;
}
</script>
</body>
</html>
